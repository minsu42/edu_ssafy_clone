spring:
  application:
    name: edu
  datasource:
    url: jdbc:mysql://localhost:3306/edu_ssafy?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

jwt:
  secret: edu-ssafy-jwt-secret-key-must-be-at-least-256-bits-for-hs256-algorithm
  access-token-expiry: 900
  refresh-token-expiry: 604800
