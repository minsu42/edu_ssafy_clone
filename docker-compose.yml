services:
  mysql:
    image: mysql:8.4
    container_name: edu-ssafy-mysql
    environment:
      MYSQL_DATABASE: edu_ssafy
      MYSQL_ROOT_PASSWORD: test
      MYSQL_USER: edu
      MYSQL_PASSWORD: test
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ptest >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: edu-ssafy-backend
    working_dir: /app
    command: ./gradlew bootRun --no-daemon
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edu_ssafy?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: test
      JWT_SECRET: edu-ssafy-jwt-secret-key-must-be-at-least-256-bits-for-hs256-algorithm
      JWT_ACCESS_TOKEN_EXPIRY: 900
      JWT_REFRESH_TOKEN_EXPIRY: 604800
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - gradle-cache:/root/.gradle
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: edu-ssafy-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

volumes:
  mysql-data:
  gradle-cache:
  frontend-node-modules:
