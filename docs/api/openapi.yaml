          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigationApiResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      items:
                        - key: dashboard
                          label: 홈
                          path: /dashboard
                          enabled: true
                          children: []
                        - key: classroom
                          label: 강의실
                          path: /classroom
                          enabled: false
                          children: []
                    error: null
                    meta: null
        '401':
          $ref: '#/components/responses/Unauthorized'
  /app/bootstrap:
