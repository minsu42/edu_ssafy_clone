          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppBootstrapApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    NotificationIdParam:
      name: notificationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    CourseIdParam:
      name: courseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ContentIdParam:
      name: contentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    QuestIdParam:
      name: questId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BoardCodeParam:
      name: boardCode
      in: path
      required: true
      schema:
        type: string
        example: NOTICE
    PostIdParam:
      name: postId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    ValidationError:
      description: 요청 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            validationError:
              value:
                success: false
                data: null
                error:
                  code: VALIDATION_ERROR
                  message: 요청 값이 올바르지 않습니다.
                  details:
                    - field: email
                      reason: 이메일 형식이어야 합니다.
                meta: null
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            unauthorized:
              value:
                success: false
                data: null
                error:
                  code: AUTH_UNAUTHORIZED
                  message: 인증이 필요합니다.
                  details: []
                meta: null
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorApiResponse'
          examples:
            notFound:
              value:
                success: false
                data: null
                error:
                  code: RESOURCE_NOT_FOUND
                  message: 요청한 리소스를 찾을 수 없습니다.
                  details: []
                meta: null
  schemas:
    ApiResponse:
      type: object
      required: [success, data, error]
      properties:
        success:
          type: boolean
        data:
          description: 성공 시 payload. 오류 시 null.
        error:
          anyOf:
            - $ref: '#/components/schemas/ErrorBody'
            - type: 'null'
        meta:
          anyOf:
            - $ref: '#/components/schemas/PageMeta'
            - type: 'null'
    EmptyApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: 'null'
    ErrorApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            success:
              const: false
            data:
              type: 'null'
            error:
              $ref: '#/components/schemas/ErrorBody'
    ErrorBody:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, AUTH_INVALID_CREDENTIALS, AUTH_UNAUTHORIZED, AUTH_FORBIDDEN, RESOURCE_NOT_FOUND, CONFLICT, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: array
          items:
            type: object
            additionalProperties: true
    PageMeta:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: student@example.com
        password:
          type: string
          format: password
          minLength: 8
          example: password123!
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          description: Planned refresh token. 첫 배포에서는 구현하지 않아도 된다.
    LoginResponse:
      type: object
      required: [accessToken, tokenType, expiresIn, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          description: access token lifetime in seconds
        user:
          $ref: '#/components/schemas/CurrentUser'
    LoginApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LoginResponse'
