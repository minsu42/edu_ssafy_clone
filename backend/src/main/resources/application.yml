spring:
  application:
    name: edu
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:32768/edu_ssafy?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:test}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET:edu-ssafy-jwt-secret-key-must-be-at-least-256-bits-for-hs256-algorithm}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}
